<!DOCTYPE html>
<html>
    <head>
        <title>Categories</title>
    </head>

    <style>
        .categories-container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.category-card{
    width:200px;
    padding:20px;
    background:white;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.2s;
}

.category-card:hover{
    transform:translateY(-4px);
}
    </style>
    <body>
    

<h1>📚 Categories</h1>

<div class="categories-container">

    <div class="category-card"
         onclick="loadCategory('DSA')">
        <h2>DSA</h2>
    </div>

    <div class="category-card"
         onclick="loadCategory('Java')">
        <h2>Java</h2>
    </div>

    <div class="category-card"
         onclick="loadCategory('OOPS')">
        <h2>OOPS</h2>
    </div>

</div>

<div class="topics-section">

    <h2>Topics</h2>

    <ul id="topicList"></ul>

</div>



        

        <script src="categories.js"></script>
    </body>
</html>
